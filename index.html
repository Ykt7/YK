<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>中华民族历史观 题库</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7fb; color: #1e293b; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { max-width: 800px; width: 100%; background: #fff; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); padding: 30px 25px; }

.lecture-btn { background: #f1f5f9; border: none; padding: 6px 14px; border-radius: 30px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; transition: all 0.15s; }

.question-origin { font-size: 13px; color: #94a3b8; margin-bottom: 16px; }
.options-grid { display: flex; flex-direction: column; gap: 10px; }
.option-item { background: #f8fafc; border: 2px solid #e9edf2; border-radius: 12px; padding: 12px 18px; cursor: pointer; transition: all 0.15s; font-size: 15px; display: flex; align-items: flex-start; gap: 12px; }
.option-item .label { font-weight: 700; color: #64748b; min-width: 24px; flex-shrink: 0; }
.option-item.selected { border-color: #3b82f6; background: #eff6ff; }
.option-item.correct { border-color: #22c55e; background: #f0fdf4; }
.option-item.correct .label { color: #16a34a; }
.option-item.wrong { border-color: #ef4444; background: #fef2f2; }
.option-item.wrong .label { color: #dc2626; }
.option-item.disabled { cursor: default; opacity: 0.7; }
.option-item.disabled.correct { opacity: 1; }
.option-item.disabled.wrong { opacity: 1; }
.feedback-area { margin-top: 18px; padding: 14px 18px; border-radius: 12px; display: none; font-weight: 500; }
.feedback-area.show { display: block; }
.feedback-area.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.feedback-area.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.feedback-area.info { background: #eff6ff; color: #1e3a8a; border: 1px solid #bfdbfe; }
.btn-group { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 12px; flex-wrap: wrap; }
.btn { background: white; border: 1px solid #d1d9e6; padding: 10px 24px; border-radius: 40px; font-weight: 600; font-size: 14px; color: #1e293b; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: #1e293b; border-color: #1e293b; color: white; }
.btn-success { background: #22c55e; border-color: #22c55e; color: white; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-outline { background: transparent; border: 1px solid #d1d9e6; }

</head>
<body>

    ],
    multi: [
      { q: "下列哪些是1937年《陕甘宁边区选举条例》和《陕甘宁边区施政纲领》中关于民族平等的体现？", o: ["边区境内人民不分民族，都有选举权与被选举权", "保障各民族的政治平等", "建立蒙、回民族的自治区", "实行民族区域自治制度"], a: [0,1,2] },
      { q: "在抗日战争期间，中国共产党推动全民族抗战的主要表现包括？", o: ["提出建立抗日民族统一战线", "成立\"蒙汉抗日同盟会\"\"反帝大同盟\"等组织", "马本斋领导八路军第三纵队回民支队", "组织\"蒙藏回族联合慰劳抗战将士代表团\""], a: [0,1,2,3] },
      { q: "下列哪些是民国时期边疆治理的举措？", o: ["北洋政府公布《蒙疆善后委员会条例》", "南京国民政府设立直属于行政院的蒙藏委员会", "九一八事变后提出开发西北边疆的提案", "1939年将成吉思汗陵西迁"], a: [0,1,2,3] }
    ]
  }
};

// ===================== 应用逻辑 =====================
var app = {
  currentLecture: '第1讲',
  currentIndex: 0,
  totalCorrect: 0,
  totalAnswered: 0
};
var answerState = {};

function getAllQuestions(lecture) {
  var data = LECTURES[lecture];
  if (!data) return [];
  var single = data.single.map(function(q) { q.type = 'single'; return q; });
  var multi = data.multi.map(function(q) { q.type = 'multi'; return q; });
  return single.concat(multi);
}
function getQuestionKey(lecture, idx) { return lecture + '_' + idx; }

var questionText = document.getElementById('questionText');
var questionOrigin = document.getElementById('questionOrigin');
var optionsContainer = document.getElementById('optionsContainer');
var feedbackArea = document.getElementById('feedbackArea');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');
var confirmMultiBtn = document.getElementById('confirmMultiBtn');
var progressLabel = document.getElementById('progressLabel');
var typeBadge = document.getElementById('typeBadge');
var correctCountSpan = document.getElementById('correctCount');
var totalAnsweredSpan = document.getElementById('totalAnswered');
var lectureNav = document.getElementById('lectureNav');
var resetBtn = document.getElementById('resetBtn');

var currentCorrectAnswer = null;
var currentQuestionType = 'single';
var isAnswered = false;

function renderQuestion() {
  try {
    var lecture = app.currentLecture;
    var allQuestions = getAllQuestions(lecture);
    if (allQuestions.length === 0) {
      questionText.textContent = '该讲暂无题目';
      optionsContainer.innerHTML = '';
      feedbackArea.classList.remove('show');
      return;
    }
    if (app.currentIndex >= allQuestions.length) app.currentIndex = 0;
    if (app.currentIndex < 0) app.currentIndex = 0;

    var q = allQuestions[app.currentIndex];
    currentQuestionType = q.type;
    currentCorrectAnswer = q.a;
    var key = getQuestionKey(lecture, app.currentIndex);
    var saved = answerState[key];

    questionText.textContent = q.q;
    questionOrigin.textContent = '来源：' + lecture + ' · 第 ' + (app.currentIndex + 1) + ' 题';
    typeBadge.textContent = q.type === 'single' ? '单选题' : '多选题';

    optionsContainer.innerHTML = '';
    var labels = 'ABCDEFGH'.split('');
    q.o.forEach(function(opt, idx) {
      var div = document.createElement('div');
      div.className = 'option-item';
      div.dataset.index = idx;
      var labelSpan = document.createElement('span');
      labelSpan.className = 'label';
      labelSpan.textContent = labels[idx] + '.';
      var textSpan = document.createElement('span');
      textSpan.textContent = opt;
      div.appendChild(labelSpan);
      div.appendChild(textSpan);
      optionsContainer.appendChild(div);
    });

    feedbackArea.classList.remove('show');
    feedbackArea.className = 'feedback-area';
    confirmMultiBtn.style.display = 'none';
    isAnswered = false;

    if (saved && saved.answered) {
      isAnswered = true;
      var selectedIndices = saved.selected;
      var items = optionsContainer.querySelectorAll('.option-item');
      items.forEach(function(item, idx) {
        if (selectedIndices.indexOf(idx) !== -1) item.classList.add('selected');
      });
      if (q.type === 'single') {
        var isCorrect = selectedIndices[0] === q.a;
        showSingleResult(selectedIndices[0], isCorrect);
      } else {
        var sortedSelected = selectedIndices.slice().sort();
        var sortedCorrect = q.a.slice().sort();
        var isCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
        showMultiResult(selectedIndices, isCorrect);
      }
    } else {
      if (q.type === 'single') {
        var items = optionsContainer.querySelectorAll('.option-item');
        items.forEach(function(item) {
          item.addEventListener('click', function() {
            if (isAnswered) return;
            var idx = parseInt(this.dataset.index);
            handleSingleClick(idx);
          });
        });
      } else {
        var items = optionsContainer.querySelectorAll('.option-item');
        items.forEach(function(item) {
          item.addEventListener('click', function() {
            if (isAnswered) return;
            var idx = parseInt(this.dataset.index);
            this.classList.toggle('selected');
          });
        });
        confirmMultiBtn.style.display = 'inline-flex';
        confirmMultiBtn.onclick = function() {
          if (isAnswered) return;
          var selected = [];
          document.querySelectorAll('.option-item.selected').forEach(function(el) {
            selected.push(parseInt(el.dataset.index));
          });
          handleMultiSubmit(selected);
        };
      }
    }

    progressLabel.textContent = '第 ' + (app.currentIndex + 1) + ' / ' + allQuestions.length + ' 题';
    prevBtn.disabled = (app.currentIndex === 0);
    updateStats();
    updateLectureNav();
  } catch (e) {
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('errorMsg').textContent = '渲染出错：' + e.message;
  }
}

function handleSingleClick(index) {
  var lecture = app.currentLecture;
  var allQuestions = getAllQuestions(lecture);
  var q = allQuestions[app.currentIndex];
  var isCorrect = index === q.a;
  var key = getQuestionKey(lecture, app.currentIndex);
  answerState[key] = { selected: [index], answered: true, isCorrect: isCorrect };
  isAnswered = true;
  if (isCorrect) app.totalCorrect++;
  app.totalAnswered++;
  updateStats();
  showSingleResult(index, isCorrect);
}

function showSingleResult(selectedIdx, isCorrect) {
  var items = optionsContainer.querySelectorAll('.option-item');
  items.forEach(function(item, idx) {
    item.classList.add('disabled');
    if (idx === currentCorrectAnswer) item.classList.add('correct');
    if (idx === selectedIdx && !isCorrect) item.classList.add('wrong');
  });
  feedbackArea.className = 'feedback-area show';
  feedbackArea.classList.add(isCorrect ? 'success' : 'error');
  feedbackArea.textContent = isCorrect ? '✅ 回答正确！' : '❌ 回答错误。正确答案已高亮。';
  confirmMultiBtn.style.display = 'none';
}

function handleMultiSubmit(selected) {
  if (selected.length === 0) {
    feedbackArea.className = 'feedback-area show info';
    feedbackArea.textContent = '⚠️ 请至少选择一个选项。';
    return;
  }
  var lecture = app.currentLecture;
  var allQuestions = getAllQuestions(lecture);
  var q = allQuestions[app.currentIndex];
  var sortedSelected = selected.slice().sort();
  var sortedCorrect = q.a.slice().sort();
  var isCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
  var key = getQuestionKey(lecture, app.currentIndex);
  answerState[key] = { selected: selected, answered: true, isCorrect: isCorrect };
  isAnswered = true;
  if (isCorrect) app.totalCorrect++;
  app.totalAnswered++;
  updateStats();
  showMultiResult(selected, isCorrect);
}

function showMultiResult(selected, isCorrect) {
  var items = optionsContainer.querySelectorAll('.option-item');
  items.forEach(function(item, idx) {
    item.classList.add('disabled');
    if (currentCorrectAnswer.indexOf(idx) !== -1) item.classList.add('correct');
    if (selected.indexOf(idx) !== -1 && currentCorrectAnswer.indexOf(idx) === -1) item.classList.add('wrong');
  });
  feedbackArea.className = 'feedback-area show';
  feedbackArea.classList.add(isCorrect ? 'success' : 'error');
  feedbackArea.textContent = isCorrect ? '✅ 全部选对！' : '❌ 答案不完全正确。正确选项已高亮（绿色），您误选的已标红。';
  confirmMultiBtn.style.display = 'none';
}

function goToPrev() { if (app.currentIndex > 0) { app.currentIndex--; renderQuestion(); } }
function goToNext() {
  var all = getAllQuestions(app.currentLecture);
  if (app.currentIndex < all.length - 1) { app.currentIndex++; renderQuestion(); }
  else if (all.length > 0) { app.currentIndex = 0; renderQuestion(); }
}
function updateStats() {
  correctCountSpan.textContent = app.totalCorrect;
  totalAnsweredSpan.textContent = app.totalAnswered;
}
function switchLecture(name) {
  if (!LECTURES[name]) return;
  app.currentLecture = name;
  app.currentIndex = 0;
  renderQuestion();
}
function updateLectureNav() {
  var keys = Object.keys(LECTURES);
  lectureNav.innerHTML = '';
  keys.forEach(function(name) {
    var btn = document.createElement('button');
    btn.className = 'lecture-btn' + (name === app.currentLecture ? ' active' : '');
    btn.textContent = name;
    btn.onclick = function() { switchLecture(name); };
    lectureNav.appendChild(btn);
  });
}
function resetProgress() {
  for (var k in answerState) delete answerState[k];
  app.totalCorrect = 0;
  app.totalAnswered = 0;
  updateStats();
  renderQuestion();
}

prevBtn.addEventListener('click', goToPrev);
nextBtn.addEventListener('click', goToNext);
resetBtn.addEventListener('click', resetProgress);
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') goToPrev();
  else if (e.key === 'ArrowRight') goToNext();
});

updateLectureNav();
renderQuestion();
</script>
</body>
</html>
